# render.yaml (worker)
services:
  - type: worker
    name: spothero-facilities-minimal-worker
    runtime: python
    region: oregon
    plan: free
    autoDeploy: true

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt

    # No $PORT on workers; your main.py starts uvicorn itself.
    startCommand: python main.py

    envVars:
      - key: GRAPH_TENANT_ID
        sync: false
      - key: GRAPH_CLIENT_ID
        sync: false
      - key: GRAPH_CLIENT_SECRET
        sync: false
      - key: SP_SITE_ID
        sync: false
      - key: SP_DRIVE_ID
        sync: false
      - key: SP_TOKEN_JSON_PATH
        value: Business Optimization/Automation/token/token.json

      # Optional behavior knobs (match your code defaults)
      - key: STARTUP_FORCE_GRAPH_REFRESH
        value: "true"
      - key: SH_UPDATE_ENABLED
        value: "true"
      - key: SH_UPDATE_INTERVAL_SECONDS
        value: "14400"
      - key: SH_UPDATE_ONLY_TIERED
        value: "true"
      - key: SH_UPDATE_DRY_RUN
        value: "false"
      - key: SH_UPDATE_DEBUG
        value: "false"
      - key: SH_UPDATE_TZ
        value: "America/Chicago"
      - key: SH_UPDATE_MAX_CONCURRENCY
        value: "2"
      - key: SH_UPDATE_PAUSE_SEC
        value: "0.25"
      - key: SH_UPDATE_JITTER_SEC
        value: "0.15"
      - key: LOG_LEVEL
        value: "INFO"

      # ParkWhiz reservation flow (disabled by default; enable in Render secrets)
      - key: PARKWHIZ_ENABLED
        value: "false"
      - key: PARKWHIZ_POLL_INTERVAL_SECONDS
        value: "90"
      - key: PARKWHIZ_DRY_RUN
        value: "false"
      - key: GMAIL_AUTH_MODE
        value: "oauth"
      - key: GMAIL_QUERY
        value: "label:#parkwhiz-reservation is:unread"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false
      - key: GMAIL_DELEGATE_USER
        sync: false
      - key: PARKWHIZ_TEAMS_WEBHOOK_URL
        sync: false
